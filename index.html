<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIXEL ARENA - TOURNOI FC26</title>
    <style>
        :root {
            --bg-color: #0f0c1b;
            --card-bg: #1d1836;
            --accent-color: #00ff87;
            --danger-color: #ff4a4a;
            --text-color: #ffffff;
            --text-muted: #a3a0b8;
            --border-color: #2f2954;
            --input-bg: #2a244d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 20px;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 15px;
            position: relative;
        }

        header h1 {
            font-size: 2.3rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        header h1 span {
            color: var(--accent-color);
        }

        /* Panneau de configuration */
        .config-panel {
            background: var(--card-bg);
            border: 2px solid var(--accent-color);
            border-radius: 12px;
            padding: 20px;
            max-width: 950px;
            margin: 0 auto 30px auto;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        .config-title {
            font-size: 1.2rem;
            text-transform: uppercase;
            color: var(--accent-color);
            margin-bottom: 15px;
            font-weight: bold;
        }

        .config-main {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
        }

        .config-left {
            flex: 1;
            min-width: 320px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .config-right {
            flex: 1;
            min-width: 320px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .config-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 600;
        }

        select, input, button, textarea {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
        }

        textarea {
            resize: vertical;
            font-family: monospace;
            font-size: 0.95rem;
        }

        select:focus, input:focus, textarea:focus {
            border-color: var(--accent-color);
        }

        button.btn-primary {
            background: var(--accent-color);
            color: var(--bg-color);
            font-weight: bold;
            cursor: pointer;
            border: none;
            transition: transform 0.2s, opacity 0.2s;
            text-transform: uppercase;
            padding: 12px;
        }

        button.btn-primary:hover {
            opacity: 0.9;
            transform: scale(1.01);
        }

        button.btn-danger {
            background: rgba(255, 74, 74, 0.1);
            border: 1px solid var(--danger-color);
            color: var(--danger-color);
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            padding: 10px;
        }
        button.btn-danger:hover {
            background: var(--danger-color);
            color: #ffffff;
        }

        button.btn-secondary {
            background: transparent;
            border: 1px solid var(--text-muted);
            color: var(--text-muted);
            cursor: pointer;
        }

        .btn-toggle-view {
            position: absolute;
            right: 10px;
            top: 15px;
        }

        /* Grille des Poules */
        .grid-poules {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 25px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .poule-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            padding: 20px;
            box-shadow: 0 8px 24 rgba(0,0,0,0.3);
        }

        .poule-header {
            font-size: 1.3rem;
            text-transform: uppercase;
            color: var(--accent-color);
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .poule-count {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: none;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            color: var(--text-muted);
            font-size: 0.8rem;
            text-transform: uppercase;
            padding: 8px;
            border-bottom: 1px solid var(--border-color);
        }

        td {
            padding: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .editable-name {
            background: transparent;
            border: 1px dashed transparent;
            color: var(--text-color);
            font-weight: 600;
            width: 100%;
            font-size: 1rem;
            padding: 2px 5px;
            border-radius: 4px;
        }

        .editable-name:hover { border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.02); }
        .editable-name:focus { background: var(--input-bg); border-color: var(--accent-color); }

        .input-stat {
            width: 45px;
            text-align: center;
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-color);
            padding: 2px;
            border-radius: 4px;
            font-size: 1rem;
        }

        .input-stat:hover { border-color: rgba(255,255,255,0.2); }
        .input-stat:focus { background: var(--input-bg); border-color: var(--accent-color); }

        .col-joueur { width: 45%; }
        .col-stat { width: 11%; text-align: center; }
        .col-pts { width: 11%; text-align: center; }
        .col-pts input { color: var(--accent-color); font-weight: bold; }

        /* Mode TV */
        body.tv-mode .config-panel,
        body.tv-mode .btn-toggle-view {
            display: none !important;
        }
        body.tv-mode header { margin-bottom: 40px; }
        .tv-notice { text-align: center; font-size: 0.9rem; color: var(--text-muted); margin-top: 20px; }
        body.tv-mode .tv-notice { display: none; }
    </style>
</head>
<body>

    <header>
        <h1>PIXEL ARENA <span>• TOURNOI FC26</span></h1>
        <button class="btn-secondary btn-toggle-view" id="tv-btn" onclick="toggleTVMode()" style="display:none;">📺 Mode Écran TV</button>
    </header>

    <!-- Configurateur -->
    <div class="config-panel" id="setup-panel">
        <div class="config-title">⚙️ Configuration & Tirage au sort des Poules</div>
        
        <div class="config-main">
            <!-- Colonne Gauche -->
            <div class="config-left">
                <div class="config-group">
                    <label for="nb-poules">Nombre de Poules souhaité</label>
                    <select id="nb-poules">
                        <option value="1">1 Poule</option>
                        <option value="2">2 Poules</option>
                        <option value="3">3 Poules</option>
                        <option value="4" selected>4 Poules</option>
                        <option value="5">5 Poules</option>
                        <option value="6">6 Poules</option>
                        <option value="7">7 Poules</option>
                        <option value="8">8 Poules</option>
                    </select>
                </div>

                <div class="config-group">
                    <label for="max-joueurs">Nombre de joueurs MAX par poule</label>
                    <select id="max-joueurs">
                        <option value="99" selected>Aucune limite</option>
                        <option value="3">3 joueurs max</option>
                        <option value="4">4 joueurs max</option>
                        <option value="5">5 joueurs max</option>
                        <option value="6">6 joueurs max</option>
                        <option value="7">7 joueurs max</option>
                        <option value="8">8 joueurs max</option>
                    </select>
                </div>
                
                <button class="btn-primary" onclick="genererPoulesAléatoires()">🔀 Lancer le tirage & Générer</button>
                <button class="btn-danger" id="reset-btn" onclick="clearTournament()" style="display:none;">⚠️ Vider la mémoire / Reset</button>
            </div>

            <!-- Colonne Droite -->
            <div class="config-right">
                <label for="liste-joueurs">Liste des Joueurs (1 nom par ligne)</label>
                <textarea id="liste-joueurs" rows="8" placeholder="Collez vos pseudos ici..."></textarea>
            </div>
        </div>
    </div>

    <!-- Conteneur des Poules -->
    <div class="grid-poules" id="poules-container"></div>

    <div class="tv-notice" id="tv-notice" style="display:none;">
        Sauvegarde automatique active 🟢 Pour figer l'affichage sur le Fire Stick, cliquez sur <strong>📺 Mode Écran TV</strong>.
    </div>

    <script>
        // Charger le tournoi au démarrage si une sauvegarde existe
        window.onload = function() {
            if (localStorage.getItem('pixelArena_poulesData')) {
                restaurerTournoi();
            }
        };

        function genererPoulesAléatoires() {
            var nbPoules = parseInt(document.getElementById('nb-poules').value);
            var maxParPoule = parseInt(document.getElementById('max-joueurs').value);
            var textJoueurs = document.getElementById('liste-joueurs').value;
            
            var joueurs = textJoueurs.split('\n')
                .map(function(name) { return name.trim(); })
                .filter(function(name) { return name.length > 0; });

            if (joueurs.length === 0) {
                alert("Veuillez entrer au moins quelques noms de joueurs dans la zone de texte.");
                return;
            }

            if (joueurs.length > (nbPoules * maxParPoule)) {
                alert("⚠️ Configuration impossible : " + joueurs.length + " joueurs pour seulement " + (nbPoules * maxParPoule) + " places.");
                return;
            }

            // Mélange Aléatoire
            for (var i = joueurs.length - 1; i > 0; i--) {
                var j = Math.floor(Math.random() * (i + 1));
                var temp = joueurs[i];
                joueurs[i] = joueurs[j];
                joueurs[j] = temp;
            }

            var poules = [];
            var alphabet = "ABCDEFGH";
            for (var p = 0; p < nbPoules; p++) {
                poules.push({ nom: "Poule " + alphabet[p], membres: [] });
            }

            var indexJoueur = 0;
            while (indexJoueur < joueurs.length) {
                var aDistribue = false;
                for (var k = 0; k < nbPoules; k++) {
                    if (indexJoueur >= joueurs.length) break;
                    if (poules[k].membres.length < maxParPoule) {
                        poules[k].membres.push({ nom: joueurs[indexJoueur], j: 0, g: 0, diff: "0", pts: 0 });
                        indexJoueur++;
                        aDistribue = true;
                    }
                }
                if (!aDistribue) break;
            }

            sauvegarderEtAfficher(poules);
        }

        function sauvegarderEtAfficher(poules) {
            localStorage.setItem('pixelArena_poulesData', JSON.stringify(poules));
            afficherPoules(poules);
        }

        function afficherPoules(poules) {
            var container = document.getElementById('poules-container');
            container.innerHTML = '';

            poules.forEach(function(poule, pIdx) {
                if (poule.membres.length === 0) return;

                var pouleCard = document.createElement('div');
                pouleCard.className = 'poule-card';
                
                var pouleHeader = document.createElement('div');
                pouleHeader.className = 'poule-header';
                pouleHeader.innerHTML = '<span>' + poule.nom + '</span><span class="poule-count">' + poule.membres.length + ' Joueurs</span>';
                pouleCard.appendChild(pouleHeader);
                
                var table = document.createElement('table');
                table.innerHTML = '<thead><tr><th class="col-joueur">Joueur</th><th class="col-stat">J</th><th class="col-stat">G</th><th class="col-stat">Diff</th><th class="col-pts">Pts</th></tr></thead>';
                
                var tbody = document.createElement('tbody');
                
                poule.membres.forEach(function(joueur, jIdx) {
                    var tr = document.createElement('tr');
                    
                    tr.innerHTML = 
                        '<td class="col-joueur"><input type="text" class="editable-name" value="' + joueur.nom + '" onchange="updateLive(' + pIdx + ',' + jIdx + ',\'nom\',this.value)"></td>' +
                        '<td class="col-stat"><input type="number" class="input-stat" value="' + joueur.j + '" min="0" onchange="updateLive(' + pIdx + ',' + jIdx + ',\'j\',this.value)"></td>' +
                        '<td class="col-stat"><input type="number" class="input-stat" value="' + joueur.g + '" min="0" onchange="updateLive(' + pIdx + ',' + jIdx + ',\'g\',this.value)"></td>' +
                        '<td class="col-stat"><input type="text" class="input-stat" value="' + joueur.diff + '" onchange="updateLive(' + pIdx + ',' + jIdx + ',\'diff\',this.value)"></td>' +
                        '<td class="col-pts"><input type="number" class="input-stat" value="' + joueur.pts + '" min="0" onchange="updateLive(' + pIdx + ',' + jIdx + ',\'pts\',this.value)"></td>';
                    
                    tbody.appendChild(tr);
                });
                
                table.appendChild(tbody);
                pouleCard.appendChild(table);
                container.appendChild(pouleCard);
            });

            document.getElementById('tv-btn').style.display = 'block';
            document.getElementById('tv-notice').style.display = 'block';
            document.getElementById('reset-btn').style.display = 'block';
        }

        function updateLive(pIdx, jIdx, champ, valeur) {
            var data = JSON.parse(localStorage.getItem('pixelArena_poulesData'));
            if(champ === 'j' || champ === 'g' || champ === 'pts') {
                data[pIdx].membres[jIdx][champ] = parseInt(valeur) || 0;
            } else {
                data[pIdx].membres[jIdx][champ] = valeur;
            }
            localStorage.setItem('pixelArena_poulesData', JSON.stringify(data));
        }

        function restaurerTournoi() {
            var data = JSON.parse(localStorage.getItem('pixelArena_poulesData'));
            if(data) afficherPoules(data);
        }

        function clearTournament() {
            if(confirm("Êtes-vous sûr de vouloir supprimer TOUTES les données de ce tournoi pour en créer un nouveau ?")) {
                localStorage.removeItem('pixelArena_poulesData');
                document.getElementById('poules-container').innerHTML = '';
                document.getElementById('tv-btn').style.display = 'none';
                document.getElementById('tv-notice').style.display = 'none';
                document.getElementById('reset-btn').style.display = 'none';
                document.getElementById('liste-joueurs').value = '';
            }
        }

        function toggleTVMode() {
            document.body.classList.add('tv-mode');
            if(!document.getElementById('exit-tv-btn')) {
                var exitBtn = document.createElement('button');
                exitBtn.id = 'exit-tv-btn';
                exitBtn.innerText = "⚙️ Réouvrir la configuration";
                exitBtn.style.position = 'fixed';
                exitBtn.style.bottom = '10px';
                exitBtn.style.right = '10px';
                exitBtn.style.opacity = '0.3';
                exitBtn.style.fontSize = '0.8rem';
                exitBtn.className = 'btn-secondary';
                exitBtn.onclick = function() {
                    document.body.classList.remove('tv-mode');
                    exitBtn.remove();
                };
                document.body.appendChild(exitBtn);
            }
        }
    </script>
</body>
</html>
