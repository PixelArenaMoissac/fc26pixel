<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIXEL ARENA - TOURNOI FC26</title>
    <style>
        :root {
            --bg-color: #0f0c1b;
            --card-bg: #1d1836;
            --accent-color: #00ff87;
            --token-color: #ffd700;
            --silver-color: #c0c0c0;
            --bronze-color: #cd7f32;
            --danger-color: #ff4a4a;
            --text-color: #ffffff;
            --text-muted: #a3a0b8;
            --border-color: #2f2954;
            --input-bg: #2a244d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: var(--accent-color);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .setup-section {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto 30px auto;
        }

        .selector-group {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .selector-group select {
            padding: 10px;
            background-color: var(--input-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        .players-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .form-group {
            margin-bottom: 10px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-weight: bold;
        }

        input, button {
            width: 100%;
            padding: 12px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-color);
            font-size: 16px;
            outline: none;
        }

        input:focus {
            border-color: var(--accent-color);
        }

        button {
            background-color: var(--accent-color);
            color: var(--bg-color);
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: background 0.2s;
            margin-top: 10px;
        }

        button:hover {
            background-color: #00cc6a;
        }

        .section-title {
            color: var(--accent-color);
            text-transform: uppercase;
            margin: 30px 0 15px 0;
            text-align: center;
            letter-spacing: 1px;
        }

        .groups-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 25px;
            max-width: 1400px;
            margin: 0 auto;
        }

        @media (max-width: 600px) {
            .groups-container { grid-template-columns: 1fr; }
        }

        .group-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
        }

        .group-title {
            color: var(--token-color);
            font-size: 1.3em;
            margin-bottom: 15px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 5px;
        }

        .journee-title {
            color: var(--accent-color);
            font-size: 0.9em;
            font-weight: bold;
            margin: 15px 0 8px 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-left: 3px solid var(--accent-color);
            padding-left: 8px;
        }

        .match-wrapper {
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            margin-bottom: 12px;
            padding: 10px;
        }

        .match-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .team {
            flex: 1;
            font-size: 14px;
            font-weight: 500;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .team.home { text-align: right; }
        .team.away { text-align: left; }

        .team-sub {
            font-size: 12px;
            color: var(--token-color);
            font-weight: bold;
            display: block;
            margin-top: 3px;
        }

        .vs {
            padding: 0 5px;
            color: var(--accent-color);
            font-weight: bold;
            font-style: italic;
            font-size: 12px;
        }

        .score-input {
            width: 45px;
            text-align: center;
            padding: 5px;
            margin: 0 8px;
            border-radius: 4px;
            background-color: var(--input-bg);
        }

        .btn-random {
            background-color: #2a244d;
            border: 1px solid var(--border-color);
            color: var(--accent-color);
            font-size: 11px;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            width: auto;
            margin: 8px auto 0 auto;
            display: block;
            text-transform: none;
            transition: all 0.2s;
        }
        .btn-random:hover { 
            background-color: var(--accent-color); 
            color: var(--bg-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            font-size: 14px;
        }

        th, td {
            padding: 8px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            color: var(--text-muted);
            font-weight: bold;
        }

        td.player-name {
            text-align: left;
            font-weight: bold;
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .qualified-zone {
            background-color: rgba(0, 255, 135, 0.05);
        }

        .phase-finale-container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
        }

        .arbre {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            flex-wrap: wrap;
        }

        .tour {
            flex: 1;
            min-width: 270px;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            gap: 15px;
        }

        .tour-title {
            text-align: center;
            color: var(--token-color);
            margin-bottom: 10px;
            font-size: 1.1em;
            text-transform: uppercase;
        }

        .hidden { display: none; }
        
        .badge {
            display: inline-block;
            width: 18px;
            height: 18px;
            line-height: 18px;
            border-radius: 50%;
            font-weight: bold;
            color: #000;
            text-align: center;
            font-size: 11px;
        }
        .badge-1 { background-color: var(--accent-color); }
        .badge-2 { background-color: rgba(0, 255, 135, 0.6); }

        .winner-banner {
            text-align: center;
            font-size: 1.8em;
            color: var(--token-color);
            margin: 20px 0;
            padding: 15px;
            border: 2px dashed var(--token-color);
            border-radius: 8px;
            background-color: rgba(255, 215, 0, 0.05);
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <header>
        <h1>Pixel Arena — Tournoi FC 26</h1>
        <p>Gestionnaire de Poules & Phase Finale Adaptatif</p>
    </header>

    <div class="setup-section" id="setupSection">
        <div class="selector-group">
            <label for="nbJoueursSelect">Nombre de joueurs :</label>
            <select id="nbJoueursSelect" onchange="adapterGrilleJoueurs(this.value)">
                <option value="4">4 Joueurs (1 Poule)</option>
                <option value="6">6 Joueurs (2 Poules de 3)</option>
                <option value="8">8 Joueurs (2 Poules de 4)</option>
                <option value="10">10 Joueurs (2 Poules de 5)</option>
                <option value="12">12 Joueurs (3 Poules de 4)</option>
                <option value="14">14 Joueurs (2 Poules de 7)</option>
                <option value="16" selected>16 Joueurs (4 Poules de 4)</option>
            </select>
        </div>

        <label>Noms des joueurs :</label>
        <div class="players-grid" id="playersGrid">
            <!-- Rempli en JS dynamique -->
        </div>
        <button onclick="genererTournoi()">Lancer le Tournoi</button>
    </div>

    <div id="tournamentLayout" class="hidden">
        <h2 class="section-title">🏆 Phase de Poules</h2>
        <div class="groups-container" id="groupsContainer"></div>

        <h2 class="section-title" id="titlePhaseFinale">🔥 Phase Finale</h2>
        <div class="phase-finale-container">
            <div id="winnerBanner" class="winner-banner hidden"></div>
            <div class="arbre">
                <div class="tour" id="col-quarts">
                    <div class="tour-title">Quarts de Finale</div>
                    <div id="bracket-quarts"></div>
                </div>
                <div class="tour" id="col-demis">
                    <div class="tour-title">Demi-Finales</div>
                    <div id="bracket-demis"></div>
                </div>
                <div class="tour" id="col-finale">
                    <div class="tour-title">Grand Finale</div>
                    <div id="bracket-finale"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let maxJoueurs = 16;
        let listeJoueurs = [];
        let groupes = {};
        let matchsPoules = [];
        
        const listeEquipes = [
            "France", "Argentine", "Espagne", "Portugal", "Brésil", "Allemagne", 
            "Côte d'Ivoire", "Maroc", "Angleterre", "Pays-Bas", "Belgique", "Italie"
        ];

        let phaseFinale = { quarts: [], demis: [], finale: [] };

        // Initialisation de la grille
        adapterGrilleJoueurs(16);

        function adapterGrilleJoueurs(nb) {
            maxJoueurs = parseInt(nb, 10);
            const grid = document.getElementById('playersGrid');
            grid.innerHTML = '';
            for(let i = 1; i <= maxJoueurs; i++) {
                grid.innerHTML += `
                    <div class="form-group">
                        <input type="text" class="player-in" value="Joueur ${i}">
                    </div>
                `;
            }
        }

        function genererTournoi() {
            listeJoueurs = [];
            const inputs = document.querySelectorAll('.player-in');
            inputs.forEach(input => {
                if(input.value.trim() !== "") listeJoueurs.push(input.value.trim());
            });

            while(listeJoueurs.length < maxJoueurs) {
                listeJoueurs.push("Joueur " + (listeJoueurs.length + 1));
            }

            listeJoueurs.sort(() => Math.random() - 0.5);

            // Structuration automatique des poules selon le nombre de joueurs
            groupes = {};
            let nomsGroupes = ['A'];
            if (maxJoueurs >= 6 && maxJoueurs <= 10) nomsGroupes = ['A', 'B'];
            if (maxJoueurs === 12) nomsGroupes = ['A', 'B', 'C'];
            if (maxJoueurs === 14) nomsGroupes = ['A', 'B'];
            if (maxJoueurs === 16) nomsGroupes = ['A', 'B', 'C', 'D'];

            nomsGroupes.forEach(g => groupes[g] = []);
            
            for (let i = 0; i < maxJoueurs; i++) {
                let grp = nomsGroupes[i % nomsGroupes.length];
                groupes[grp].push(listeJoueurs[i]);
            }

            matchsPoules = [];
            // Génération dynamique des rencontres de poules (Algorithme de Berger simplifié)
            Object.keys(groupes).forEach(g => {
                let j = groupes[g];
                let n = j.length;
                for(let k = 0; k < n; k++) {
                    for(let l = k + 1; l < n; l++) {
                        // Répartition basique en journées virtuelles pour l'affichage
                        let journee = Math.floor((k + l) % 3) + 1; 
                        matchsPoules.push({ groupe: g, journee: journee, home: j[k], away: j[l], scoreHome: null, scoreAway: null, eqHome: "", eqAway: "" });
                    }
                }
            });

            // Structurer l'arbre final selon le gabarit
            initialiserArbre();

            document.getElementById('setupSection').classList.add('hidden');
            document.getElementById('tournamentLayout').classList.remove('hidden');

            afficherPoules();
        }

        function initialiserArbre() {
            // Masquage ou affichage des colonnes selon la taille
            if (maxJoueurs <= 8) {
                document.getElementById('col-quarts').classList.add('hidden');
                phaseFinale.quarts = [];
                phaseFinale.demis = [
                    { id: 0, home: "1er Groupe A", away: "2e Groupe B", scoreHome: null, scoreAway: null, nextMatch: 0, nextSide: 'home', eqHome: "", eqAway: "" },
                    { id: 1, home: "1er Groupe B", away: "2e Groupe A", scoreHome: null, scoreAway: null, nextMatch: 0, nextSide: 'away', eqHome: "", eqAway: "" }
                ];
                if(maxJoueurs === 4) {
                    phaseFinale.demis[0].home = "1er Poule"; phaseFinale.demis[0].away = "4e Poule";
                    phaseFinale.demis[1].home = "2e Poule"; phaseFinale.demis[1].away = "3e Poule";
                }
            } else {
                document.getElementById('col-quarts').classList.remove('hidden');
                phaseFinale.quarts = [
                    { id: 0, home: "Qualifié", away: "Qualifié", scoreHome: null, scoreAway: null, nextMatch: 0, nextSide: 'home', eqHome: "", eqAway: "" },
                    { id: 1, home: "Qualifié", away: "Qualifié", scoreHome: null, scoreAway: null, nextMatch: 0, nextSide: 'away', eqHome: "", eqAway: "" },
                    { id: 2, home: "Qualifié", away: "Qualifié", scoreHome: null, scoreAway: null, nextMatch: 1, nextSide: 'home', eqHome: "", eqAway: "" },
                    { id: 3, home: "Qualifié", away: "Qualifié", scoreHome: null, scoreAway: null, nextMatch: 1, nextSide: 'away', eqHome: "", eqAway: "" }
                ];
                phaseFinale.demis = [
                    { id: 0, home: "Gagnant Q1", away: "Gagnant Q2", scoreHome: null, scoreAway: null, nextMatch: 0, nextSide: 'home', eqHome: "", eqAway: "" },
                    { id: 1, home: "Gagnant Q3", away: "Gagnant Q4", scoreHome: null, scoreAway: null, nextMatch: 0, nextSide: 'away', eqHome: "", eqAway: "" }
                ];
            }
            phaseFinale.finale = [{ id: 0, home: "Finaliste 1", away: "Finaliste 2", scoreHome: null, scoreAway: null }];
        }

        function afficherPoules() {
            const container = document.getElementById('groupsContainer');
            container.innerHTML = '';

            Object.keys(groupes).forEach(g => {
                const groupCard = document.createElement('div');
                groupCard.className = 'group-card';
                
                let html = `<div class="group-title">Groupe ${g}</div>`;
                html += `
                    <table>
                        <thead>
                            <tr>
                                <th style="width:12%">Pos</th>
                                <th style="text-align:left;">Nom</th>
                                <th style="width:15%">Pts</th>
                                <th style="width:12%">J</th>
                                <th style="width:12%">Diff</th>
                            </tr>
                        </thead>
                        <tbody id="tbody-group-${g}"></tbody>
                    </table>
                    <div style="margin-top:15px;" id="matches-group-${g}"></div>
                `;
                
                groupCard.innerHTML = html;
                container.appendChild(groupCard);
            });

            calculerEtAfficherPoulesStats();
        }

        function calculerEtAfficherPoulesStats() {
            let stats = {};
            listeJoueurs.forEach(j => {
                stats[j] = { nom: j, points: 0, joues: 0, bp: 0, bc: 0, diff: 0 };
            });

            matchsPoules.forEach(m => {
                if (m.scoreHome !== null && m.scoreAway !== null) {
                    stats[m.home].joues++;
                    stats[m.away].joues++;
                    stats[m.home].bp += m.scoreHome;
                    stats[m.home].bc += m.scoreAway;
                    stats[m.away].bp += m.scoreAway;
                    stats[m.away].bc += m.scoreHome;

                    if (m.scoreHome > m.scoreAway) stats[m.home].points += 3;
                    else if (m.scoreHome < m.scoreAway) stats[m.away].points += 3;
                    else {
                        stats[m.home].points += 1;
                        stats[m.away].points += 1;
                    }
                }
            });

            Object.keys(stats).forEach(j => {
                stats[j].diff = stats[j].bp - stats[j].bc;
            });

            let globalRankingFlat = [];

            Object.keys(groupes).forEach(g => {
                let classement = groupes[g].map(j => stats[j]).sort((a, b) => {
                    if (b.points !== a.points) return b.points - a.points;
                    return b.diff - a.diff;
                });

                globalRankingFlat.push(...classement);

                const tbody = document.getElementById(`tbody-group-${g}`);
                tbody.innerHTML = '';
                
                let limitQualif = maxJoueurs === 16 ? 2 : (maxJoueurs === 12 ? 2 : 2);
                if (maxJoueurs === 4) limitQualif = 4;

                classement.forEach((p, idx) => {
                    let isQualifiedClass = idx < limitQualif ? 'class="qualified-zone"' : '';
                    let badge = idx < limitQualif ? `<span class="badge badge-${idx+1}">${idx+1}</span>` : `<strong>${idx+1}</strong>`;
                    
                    tbody.innerHTML += `
                        <tr ${isQualifiedClass}>
                            <td>${badge}</td>
                            <td class="player-name">${p.nom}</td>
                            <td><strong>${p.points}</strong></td>
                            <td>${p.joues}</td>
                            <td>${p.diff > 0 ? '+' + p.diff : p.diff}</td>
                        </tr>
                    `;
                });

                const matchesDiv = document.getElementById(`matches-group-${g}`);
                matchesDiv.innerHTML = '';
                
                // Regroupement visuel basique
                const mWrapperGroup = document.createElement('div');
                mWrapperGroup.className = 'journee-title';
                mWrapperGroup.innerText = "Matchs de Poule";
                matchesDiv.appendChild(mWrapperGroup);

                matchsPoules.filter(m => m.groupe === g).forEach((match) => {
                    let globalIndex = matchsPoules.indexOf(match);
                    const mWrapper = document.createElement('div');
                    mWrapper.className = 'match-wrapper';
                    
                    mWrapper.innerHTML = `
                        <div class="match-card">
                            <div class="team home">${match.home} <span class="team-sub">${match.eqHome || '⚠️ Aucune'}</span></div>
                            <input type="number" class="score-input" value="${match.scoreHome !== null ? match.scoreHome : ''}" oninput="majScorePoule(${globalIndex}, 'home', this.value)">
                            <div class="vs">VS</div>
                            <input type="number" class="score-input" value="${match.scoreAway !== null ? match.scoreAway : ''}" oninput="majScorePoule(${globalIndex}, 'away', this.value)">
                            <div class="team away">${match.away} <span class="team-sub">${match.eqAway || '⚠️ Aucune'}</span></div>
                        </div>
                        <button class="btn-random" onclick="selectionnerEquipesAleatoires('poules', ${globalIndex})">🎲 Sélection Aléatoire</button>
                    `;
                    matchesDiv.appendChild(mWrapper);
                });
            });

            injecterQualifiesPhaseFinale(stats);
        }

        function majScorePoule(index, side, val) {
            let score = val === "" ? null : parseInt(val, 10);
            if(side === 'home') matchsPoules[index].scoreHome = score;
            else matchsPoules[index].scoreAway = score;
            calculerEtAfficherPoulesStats();
        }

        function injecterQualifiesPhaseFinale(stats) {
            let trierPoule = (g) => groupes[g].map(j => stats[j]).sort((a,b) => (b.points - a.points) || (b.diff - a.diff));
            
            if (maxJoueurs === 16) {
                let cA = trierPoule('A'), cB = trierPoule('B'), cC = trierPoule('C'), cD = trierPoule('D');
                phaseFinale.quarts[0].home = cA[0].nom; phaseFinale.quarts[0].away = cB[1].nom;
                phaseFinale.quarts[1].home = cC[0].nom; phaseFinale.quarts[1].away = cD[1].nom;
                phaseFinale.quarts[2].home = cB[0].nom; phaseFinale.quarts[2].away = cA[1].nom;
                phaseFinale.quarts[3].home = cD[0].nom; phaseFinale.quarts[3].away = cC[1].nom;
            } else if (maxJoueurs === 12) {
                let cA = trierPoule('A'), cB = trierPoule('B'), cC = trierPoule('C');
                let lesDeuxiemes = [cA[1], cB[1], cC[1]].sort((a,b) => (b.points - a.points) || (b.diff - a.diff));
                phaseFinale.quarts[0].home = cA[0].nom; phaseFinale.quarts[0].away = lesDeuxiemes[2].nom; 
                phaseFinale.quarts[1].home = cB[0].nom; phaseFinale.quarts[1].away = lesDeuxiemes[1].nom;
                phaseFinale.quarts[2].home = cC[0].nom; phaseFinale.quarts[2].away = lesDeuxiemes[0].nom;
                phaseFinale.quarts[3].home = cA[1].nom; phaseFinale.quarts[3].away = cB[1].nom;
            } else if (maxJoueurs === 8 || maxJoueurs === 6 || maxJoueurs === 14) {
                let cA = trierPoule('A'), cB = trierPoule('B');
                phaseFinale.demis[0].home = cA[0].nom; phaseFinale.demis[0].away = cB[1].nom;
                phaseFinale.demis[1].home = cB[0].nom; phaseFinale.demis[1].away = cA[1].nom;
            } else if (maxJoueurs === 4) {
                let cA = trierPoule('A');
                phaseFinale.demis[0].home = cA[0].nom; phaseFinale.demis[0].away = cA[3].nom;
                phaseFinale.demis[1].home = cA[1].nom; phaseFinale.demis[1].away = cA[2].nom;
            }

            calculerPhaseFinale();
        }

        function calculerPhaseFinale() {
            if(phaseFinale.quarts.length > 0) {
                phaseFinale.quarts.forEach(q => {
                    if(q.scoreHome !== null && q.scoreAway !== null) {
                        let vainqueur = q.scoreHome > q.scoreAway ? q.home : q.away;
                        if(q.nextSide === 'home') phaseFinale.demis[q.nextMatch].home = vainqueur;
                        else phaseFinale.demis[q.nextMatch].away = vainqueur;
                    }
                });
            }

            phaseFinale.demis.forEach(d => {
                if(d.scoreHome !== null && d.scoreAway !== null) {
                    let vainqueur = d.scoreHome > d.scoreAway ? d.home : d.away;
                    if(d.nextSide === 'home') phaseFinale.finale[d.nextMatch].home = vainqueur;
                    else phaseFinale.finale[d.nextMatch].away = vainqueur;
                }
            });

            const f = phaseFinale.finale[0];
            const banner = document.getElementById('winnerBanner');
            if(f.scoreHome !== null && f.scoreAway !== null) {
                let vainqueur = f.scoreHome > f.scoreAway ? f.home : f.away;
                banner.innerHTML = `👑 Vainqueur du Tournoi : ${vainqueur} 👑`;
                banner.classList.remove('hidden');
            } else {
                banner.classList.add('hidden');
            }

            afficherArbre();
        }

        function majScoreArbre(etape, index, side, val) {
            let score = val === "" ? null : parseInt(val, 10);
            if(side === 'home') phaseFinale[etape][index].scoreHome = score;
            else phaseFinale[etape][index].scoreAway = score;
            calculerPhaseFinale();
        }

        function afficherArbre() {
            if(phaseFinale.quarts.length > 0) renderEtape('quarts', 'bracket-quarts', true);
            renderEtape('demis', 'bracket-demis', true);
            renderEtape('finale', 'bracket-finale', false);
        }

        function renderEtape(etape, elementId, avecBouton) {
            const block = document.getElementById(elementId);
            block.innerHTML = '';

            phaseFinale[etape].forEach((match, index) => {
                const mWrapper = document.createElement('div');
                mWrapper.className = 'match-wrapper';
                
                let eqHDisp = avecBouton ? `<span class="team-sub">${match.eqHome || '⚠️ Aucune'}</span>` : '';
                let eqADisp = avecBouton ? `<span class="team-sub">${match.eqAway || '⚠️ Aucune'}</span>` : '';
                let buttonDisp = avecBouton ? `<button class="btn-random" onclick="selectionnerEquipesAleatoires('${etape}', ${index})">🎲 Sélection Aléatoire</button>` : '';

                mWrapper.innerHTML = `
                    <div class="match-card">
                        <div class="team home">${match.home} ${eqHDisp}</div>
                        <input type="number" class="score-input" value="${match.scoreHome !== null ? match.scoreHome : ''}" oninput="majScoreArbre('${etape}', ${index}, 'home', this.value)">
                        <div class="vs">VS</div>
                        <input type="number" class="score-input" value="${match.scoreAway !== null ? match.scoreAway : ''}" oninput="majScoreArbre('${etape}', ${index}, 'away', this.value)">
                        <div class="team away">${match.away} ${eqADisp}</div>
                    </div>
                    ${buttonDisp}
                `;
                block.appendChild(mWrapper);
            });
        }

        function selectionnerEquipesAleatoires(etape, index) {
            let index1 = Math.floor(Math.random() * listeEquipes.length);
            let index2 = Math.floor(Math.random() * listeEquipes.length);
            
            while(index1 === index2) {
                index2 = Math.floor(Math.random() * listeEquipes.length);
            }

            let eqHomeFinal = listeEquipes[index1];
            let eqAwayFinal = listeEquipes[index2];

            if (etape === 'poules') {
                matchsPoules[index].eqHome = eqHomeFinal;
                matchsPoules[index].eqAway = eqAwayFinal;
                afficherPoules();
            } else {
                phaseFinale[etape][index].eqHome = eqHomeFinal;
                phaseFinale[etape][index].eqAway = eqAwayFinal;
                afficherArbre();
            }
        }
    </script>
</body>
</html>
