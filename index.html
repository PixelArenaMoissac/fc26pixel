<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIXEL ARENA - TOURNOI FC26</title>
    <style>
        :root {
            --bg-color: #0f0c1b;
            --card-bg: #1d1836;
            --accent-color: #00ff87;
            --token-color: #ffd700;
            --silver-color: #c0c0c0;
            --bronze-color: #cd7f32;
            --danger-color: #ff4a4a;
            --text-color: #ffffff;
            --text-muted: #a3a0b8;
            --border-color: #2f2954;
            --input-bg: #2a244d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: var(--accent-color);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .setup-section {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto 30px auto;
        }

        .players-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .form-group {
            margin-bottom: 10px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-weight: bold;
        }

        input, button {
            width: 100%;
            padding: 12px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-color);
            font-size: 16px;
            outline: none;
        }

        input:focus {
            border-color: var(--accent-color);
        }

        button {
            background-color: var(--accent-color);
            color: var(--bg-color);
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: background 0.2s;
            margin-top: 10px;
        }

        button:hover {
            background-color: #00cc6a;
        }

        .section-title {
            color: var(--accent-color);
            text-transform: uppercase;
            margin: 30px 0 15px 0;
            text-align: center;
            letter-spacing: 1px;
        }

        .groups-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 25px;
            max-width: 1400px;
            margin: 0 auto;
        }

        @media (max-width: 600px) {
            .groups-container { grid-template-columns: 1fr; }
        }

        .group-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
        }

        .group-title {
            color: var(--token-color);
            font-size: 1.3em;
            margin-bottom: 15px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 5px;
        }

        .journee-title {
            color: var(--accent-color);
            font-size: 0.9em;
            font-weight: bold;
            margin: 15px 0 8px 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-left: 3px solid var(--accent-color);
            padding-left: 8px;
        }

        .match-card {
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 10px 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .team {
            flex: 1;
            font-size: 14px;
            font-weight: 500;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .team.home { text-align: right; }
        .team.away { text-align: left; }

        .vs {
            padding: 0 5px;
            color: var(--accent-color);
            font-weight: bold;
            font-style: italic;
            font-size: 12px;
        }

        .score-input {
            width: 45px;
            text-align: center;
            padding: 5px;
            margin: 0 8px;
            border-radius: 4px;
            background-color: var(--input-bg);
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            font-size: 14px;
        }

        th, td {
            padding: 8px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            color: var(--text-muted);
            font-weight: bold;
        }

        td.player-name {
            text-align: left;
            font-weight: bold;
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .qualified-zone {
            background-color: rgba(0, 255, 135, 0.05);
        }

        .phase-finale-container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
        }

        .arbre {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            flex-wrap: wrap;
        }

        .tour {
            flex: 1;
            min-width: 250px;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            gap: 15px;
        }

        .tour-title {
            text-align: center;
            color: var(--token-color);
            margin-bottom: 10px;
            font-size: 1.1em;
            text-transform: uppercase;
        }

        .hidden {
            display: none;
        }
        
        .badge {
            display: inline-block;
            width: 18px;
            height: 18px;
            line-height: 18px;
            border-radius: 50%;
            font-weight: bold;
            color: #000;
            text-align: center;
            font-size: 11px;
        }
        .badge-1 { background-color: var(--accent-color); }
        .badge-2 { background-color: rgba(0, 255, 135, 0.6); }

        .winner-banner {
            text-align: center;
            font-size: 1.8em;
            color: var(--token-color);
            margin: 20px 0;
            padding: 15px;
            border: 2px dashed var(--token-color);
            border-radius: 8px;
            background-color: rgba(255, 215, 0, 0.05);
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <header>
        <h1>Pixel Arena — Tournoi FC 26</h1>
        <p>Gestionnaire de Poules & Phase Finale (16 Joueurs)</p>
    </header>

    <div class="setup-section" id="setupSection">
        <label>Noms des 16 joueurs :</label>
        <div class="players-grid">
            <div class="form-group"><input type="text" class="player-in" value="Joueur 1"></div>
            <div class="form-group"><input type="text" class="player-in" value="Joueur 2"></div>
            <div class="form-group"><input type="text" class="player-in" value="Joueur 3"></div>
            <div class="form-group"><input type="text" class="player-in" value="Joueur 4"></div>
            <div class="form-group"><input type="text" class="player-in" value="Joueur 5"></div>
            <div class="form-group"><input type="text" class="player-in" value="Joueur 6"></div>
            <div class="form-group"><input type="text" class="player-in" value="Joueur 7"></div>
            <div class="form-group"><input type="text" class="player-in" value="Joueur 8"></div>
            <div class="form-group"><input type="text" class="player-in" value="Joueur 9"></div>
            <div class="form-group"><input type="text" class="player-in" value="Joueur 10"></div>
            <div class="form-group"><input type="text" class="player-in" value="Joueur 11"></div>
            <div class="form-group"><input type="text" class="player-in" value="Joueur 12"></div>
            <div class="form-group"><input type="text" class="player-in" value="Joueur 13"></div>
            <div class="form-group"><input type="text" class="player-in" value="Joueur 14"></div>
            <div class="form-group"><input type="text" class="player-in" value="Joueur 15"></div>
            <div class="form-group"><input type="text" class="player-in" value="Joueur 16"></div>
        </div>
        <button onclick="genererTournoi()">Lancer le Tournoi</button>
    </div>

    <div id="tournamentLayout" class="hidden">
        <h2 class="section-title">🏆 Phase de Poules</h2>
        <div class="groups-container" id="groupsContainer"></div>

        <h2 class="section-title">🔥 Phase Finale (Élimination Directe)</h2>
        <div class="phase-finale-container">
            <div id="winnerBanner" class="winner-banner hidden"></div>
            <div class="arbre">
                <div class="tour">
                    <div class="tour-title">Quarts de Finale</div>
                    <div id="bracket-quarts"></div>
                </div>
                <div class="tour">
                    <div class="tour-title">Demi-Finales</div>
                    <div id="bracket-demis"></div>
                </div>
                <div class="tour">
                    <div class="tour-title">Grand Finale</div>
                    <div id="bracket-finale"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let listeJoueurs = [];
        let groupes = { A: [], B: [], C: [], D: [] };
        let matchsPoules = [];
        
        let phaseFinale = {
            quarts: [
                { id: 0, home: "1er Groupe A", away: "2e Groupe B", scoreHome: null, scoreAway: null, nextMatch: 0, nextSide: 'home' },
                { id: 1, home: "1er Groupe C", away: "2e Groupe D", scoreHome: null, scoreAway: null, nextMatch: 0, nextSide: 'away' },
                { id: 2, home: "1er Groupe B", away: "2e Groupe A", scoreHome: null, scoreAway: null, nextMatch: 1, nextSide: 'home' },
                { id: 3, home: "1er Groupe D", away: "2e Groupe C", scoreHome: null, scoreAway: null, nextMatch: 1, nextSide: 'away' }
            ],
            demis: [
                { id: 0, home: "Gagnant Q1", away: "Gagnant Q2", scoreHome: null, scoreAway: null, nextMatch: 0, nextSide: 'home' },
                { id: 1, home: "Gagnant Q3", away: "Gagnant Q4", scoreHome: null, scoreAway: null, nextMatch: 0, nextSide: 'away' }
            ],
            finale: [
                { id: 0, home: "Gagnant Demi 1", away: "Gagnant Demi 2", scoreHome: null, scoreAway: null }
            ]
        };

        function genererTournoi() {
            listeJoueurs = [];
            const inputs = document.querySelectorAll('.player-in');
            inputs.forEach(input => {
                if(input.value.trim() !== "") listeJoueurs.push(input.value.trim());
            });

            while(listeJoueurs.length < 16) {
                listeJoueurs.push("Joueur " + (listeJoueurs.length + 1));
            }

            listeJoueurs.sort(() => Math.random() - 0.5);

            const nomsGroupes = ['A', 'B', 'C', 'D'];
            groupes = { A: [], B: [], C: [], D: [] };
            matchsPoules = [];

            for (let i = 0; i < 16; i++) {
                let grp = nomsGroupes[Math.floor(i / 4)];
                groupes[grp].push(listeJoueurs[i]);
            }

            // Génération par Journées (Chaque joueur rencontre les 3 autres sans doublons)
            nomsGroupes.forEach(g => {
                let j = groupes[g];
                // Journée 1 : 1 vs 2 et 3 vs 4
                matchsPoules.push({ groupe: g, journee: 1, home: j[0], away: j[1], scoreHome: null, scoreAway: null });
                matchsPoules.push({ groupe: g, journee: 1, home: j[2], away: j[3], scoreHome: null, scoreAway: null });
                // Journée 2 : 1 vs 3 et 2 vs 4
                matchsPoules.push({ groupe: g, journee: 2, home: j[0], away: j[2], scoreHome: null, scoreAway: null });
                matchsPoules.push({ groupe: g, journee: 2, home: j[1], away: j[3], scoreHome: null, scoreAway: null });
                // Journée 3 : 1 vs 4 et 2 vs 3
                matchsPoules.push({ groupe: g, journee: 3, home: j[0], away: j[3], scoreHome: null, scoreAway: null });
                matchsPoules.push({ groupe: g, journee: 3, home: j[1], away: j[2], scoreHome: null, scoreAway: null });
            });

            document.getElementById('setupSection').classList.add('hidden');
            document.getElementById('tournamentLayout').classList.remove('hidden');

            afficherPoules();
            afficherArbre();
        }

        function afficherPoules() {
            const container = document.getElementById('groupsContainer');
            container.innerHTML = '';

            ['A', 'B', 'C', 'D'].forEach(g => {
                const groupCard = document.createElement('div');
                groupCard.className = 'group-card';
                
                let html = `<div class="group-title">Groupe ${g}</div>`;
                html += `
                    <table>
                        <thead>
                            <tr>
                                <th style="width:12%">Pos</th>
                                <th style="text-align:left;">Nom</th>
                                <th style="width:15%">Pts</th>
                                <th style="width:12%">J</th>
                                <th style="width:12%">Diff</th>
                            </tr>
                        </thead>
                        <tbody id="tbody-group-${g}"></tbody>
                    </table>
                    <div style="margin-top:15px;" id="matches-group-${g}"></div>
                `;
                
                groupCard.innerHTML = html;
                container.appendChild(groupCard);
            });

            calculerEtAfficherPoulesStats();
        }

        function calculerEtAfficherPoulesStats() {
            let stats = {};
            listeJoueurs.forEach(j => {
                stats[j] = { nom: j, points: 0, joues: 0, bp: 0, bc: 0, diff: 0 };
            });

            matchsPoules.forEach(m => {
                if (m.scoreHome !== null && m.scoreAway !== null) {
                    stats[m.home].joues++;
                    stats[m.away].joues++;
                    stats[m.home].bp += m.scoreHome;
                    stats[m.home].bc += m.scoreAway;
                    stats[m.away].bp += m.scoreAway;
                    stats[m.away].bc += m.scoreHome;

                    if (m.scoreHome > m.scoreAway) stats[m.home].points += 3;
                    else if (m.scoreHome < m.scoreAway) stats[m.away].points += 3;
                    else {
                        stats[m.home].points += 1;
                        stats[m.away].points += 1;
                    }
                }
            });

            Object.keys(stats).forEach(j => {
                stats[j].diff = stats[j].bp - stats[j].bc;
            });

            let qualifies = {};

            ['A', 'B', 'C', 'D'].forEach(g => {
                let classement = groupes[g].map(j => stats[j]).sort((a, b) => {
                    if (b.points !== a.points) return b.points - a.points;
                    return b.diff - a.diff;
                });

                qualifies[g] = [classement[0].nom, classement[1].nom];

                const tbody = document.getElementById(`tbody-group-${g}`);
                tbody.innerHTML = '';
                classement.forEach((p, idx) => {
                    let isQualifiedClass = idx < 2 ? 'class="qualified-zone"' : '';
                    let badge = idx < 2 ? `<span class="badge badge-${idx+1}">${idx+1}</span>` : `<strong>${idx+1}</strong>`;
                    
                    tbody.innerHTML += `
                        <tr ${isQualifiedClass}>
                            <td>${badge}</td>
                            <td class="player-name">${p.nom}</td>
                            <td><strong>${p.points}</strong></td>
                            <td>${p.joues}</td>
                            <td>${p.diff > 0 ? '+' + p.diff : p.diff}</td>
                        </tr>
                    `;
                });

                const matchesDiv = document.getElementById(`matches-group-${g}`);
                matchesDiv.innerHTML = '';
                
                // Affichage propre découpé par Journées de 1 à 3
                for(let j_num = 1; j_num <= 3; j_num++) {
                    const jTitle = document.createElement('div');
                    jTitle.className = 'journee-title';
                    jTitle.innerText = `Journée ${j_num}`;
                    matchesDiv.appendChild(jTitle);

                    matchsPoules.filter(m => m.groupe === g && m.journee === j_num).forEach((match) => {
                        let globalIndex = matchsPoules.indexOf(match);
                        const mCard = document.createElement('div');
                        mCard.className = 'match-card';
                        mCard.innerHTML = `
                            <div class="team home">${match.home}</div>
                            <input type="number" class="score-input" value="${match.scoreHome !== null ? match.scoreHome : ''}" oninput="majScorePoule(${globalIndex}, 'home', this.value)">
                            <div class="vs">VS</div>
                            <input type="number" class="score-input" value="${match.scoreAway !== null ? match.scoreAway : ''}" oninput="majScorePoule(${globalIndex}, 'away', this.value)">
                            <div class="team away">${match.away}</div>
                        `;
                        matchesDiv.appendChild(mCard);
                    });
                }
            });

            injecterQualifiesPhaseFinale(qualifies);
        }

        function majScorePoule(index, side, val) {
            let score = val === "" ? null : parseInt(val, 10);
            if(side === 'home') matchsPoules[index].scoreHome = score;
            else matchsPoules[index].scoreAway = score;
            calculerEtAfficherPoulesStats();
        }

        function injecterQualifiesPhaseFinale(qualifies) {
            phaseFinale.quarts[0].home = qualifies.A[0];
            phaseFinale.quarts[0].away = qualifies.B[1];
            phaseFinale.quarts[1].home = qualifies.C[0];
            phaseFinale.quarts[1].away = qualifies.D[1];
            phaseFinale.quarts[2].home = qualifies.B[0];
            phaseFinale.quarts[2].away = qualifies.A[1];
            phaseFinale.quarts[3].home = qualifies.D[0];
            phaseFinale.quarts[3].away = qualifies.C[1];

            calculerPhaseFinale();
        }

        function calculerPhaseFinale() {
            phaseFinale.quarts.forEach(q => {
                if(q.scoreHome !== null && q.scoreAway !== null) {
                    let vainqueur = q.scoreHome > q.scoreAway ? q.home : q.away;
                    if (q.scoreHome === q.scoreAway) vainqueur = q.home + " (Tab)";
                    
                    if(q.nextSide === 'home') phaseFinale.demis[q.nextMatch].home = vainqueur;
                    else phaseFinale.demis[q.nextMatch].away = vainqueur;
                }
            });

            phaseFinale.demis.forEach(d => {
                if(d.scoreHome !== null && d.scoreAway !== null) {
                    let vainqueur = d.scoreHome > d.scoreAway ? d.home : d.away;
                    if (d.scoreHome === d.scoreAway) vainqueur = d.home + " (Tab)";
                    
                    if(d.nextSide === 'home') phaseFinale.finale[d.nextMatch].home = vainqueur;
                    else phaseFinale.finale[d.nextMatch].away = vainqueur;
                }
            });

            const f = phaseFinale.finale[0];
            const banner = document.getElementById('winnerBanner');
            if(f.scoreHome !== null && f.scoreAway !== null) {
                let vainqueur = f.scoreHome > f.scoreAway ? f.home : f.away;
                if(f.scoreHome === f.scoreAway) vainqueur = f.home + " (Tab)";
                banner.innerHTML = `👑 Vainqueur du Tournoi : ${vainqueur} 👑`;
                banner.classList.remove('hidden');
            } else {
                banner.classList.add('hidden');
            }

            afficherArbre();
        }

        function majScoreArbre(etape, index, side, val) {
            let score = val === "" ? null : parseInt(val, 10);
            if(side === 'home') phaseFinale[etape][index].scoreHome = score;
            else phaseFinale[etape][index].scoreAway = score;
            
            calculerPhaseFinale();
        }

        function afficherArbre() {
            renderEtape('quarts', 'bracket-quarts');
            renderEtape('demis', 'bracket-demis');
            renderEtape('finale', 'bracket-finale');
        }

        function renderEtape(etape, elementId) {
            const block = document.getElementById(elementId);
            block.innerHTML = '';

            phaseFinale[etape].forEach((match, index) => {
                const div = document.createElement('div');
                div.className = 'match-card';
                div.innerHTML = `
                    <div class="team home">${match.home}</div>
                    <input type="number" class="score-input" value="${match.scoreHome !== null ? match.scoreHome : ''}" oninput="majScoreArbre('${etape}', ${index}, 'home', this.value)">
                    <div class="vs">VS</div>
                    <input type="number" class="score-input" value="${match.scoreAway !== null ? match.scoreAway : ''}" oninput="majScoreArbre('${etape}', ${index}, 'away', this.value)">
                    <div class="team away">${match.away}</div>
                `;
                block.appendChild(div);
            });
        }
    </script>
</body>
</html>
