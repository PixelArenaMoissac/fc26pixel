<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIXEL ARENA - TOURNOI FC26</title>
    <style>
        :root {
            --bg-color: #0f0c1b;
            --card-bg: #1d1836;
            --accent-color: #00ff87;
            --token-color: #ffd700;
            --danger-color: #ff4a4a;
            --text-color: #ffffff;
            --text-muted: #a3a0b8;
            --border-color: #2f2954;
            --input-bg: #2a244d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: var(--accent-color);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .setup-section {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto 30px auto;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-weight: bold;
        }

        select, input, button {
            width: 100%;
            padding: 12px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-color);
            font-size: 16px;
            outline: none;
        }

        select:focus, input:focus {
            border-color: var(--accent-color);
        }

        button {
            background-color: var(--accent-color);
            color: var(--bg-color);
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: background 0.2s;
            margin-top: 10px;
        }

        button:hover {
            background-color: #00cc6a;
        }

        .tournament-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .match-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .team {
            flex: 1;
            font-size: 18px;
            font-weight: 500;
        }

        .team.home { text-align: right; }
        .team.away { text-align: left; }

        .vs {
            padding: 0 20px;
            color: var(--accent-color);
            font-weight: bold;
            font-style: italic;
        }

        .score-input {
            width: 50px;
            text-align: center;
            padding: 5px;
            margin: 0 10px;
            border-radius: 4px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <header>
        <h1>Pixel Arena — Tournoi FC 26</h1>
        <p>Gestionnaire de match dynamique</p>
    </header>

    <div class="setup-section">
        <div class="form-group">
            <label for="tournamentMode">Format du tournoi :</label>
            <select id="tournamentMode" onchange="toggleMode()">
                <option value="1v1">1 vs 1 (6 Joueurs)</option>
                <option value="2v2">2 vs 2 (3 Équipes)</option>
            </select>
        </div>

        <div id="inputs1v1">
            <label>Noms des 6 joueurs :</label>
            <div class="form-group"><input type="text" class="player-in" value="Joueur 1"></div>
            <div class="form-group"><input type="text" class="player-in" value="Joueur 2"></div>
            <div class="form-group"><input type="text" class="player-in" value="Joueur 3"></div>
            <div class="form-group"><input type="text" class="player-in" value="Joueur 4"></div>
            <div class="form-group"><input type="text" class="player-in" value="Joueur 5"></div>
            <div class="form-group"><input type="text" class="player-in" value="Joueur 6"></div>
        </div>

        <div id="inputs2v2" class="hidden">
            <label>Noms des 3 équipes (2v2) :</label>
            <div class="form-group"><input type="text" class="team-in" value="Équipe A"></div>
            <div class="form-group"><input type="text" class="team-in" value="Équipe B"></div>
            <div class="form-group"><input type="text" class="team-in" value="Équipe C"></div>
        </div>

        <button onclick="genererTournoi()">Lancer le Tournoi</button>
    </div>

    <div class="tournament-container">
        <h2 id="roundTitle" style="margin-bottom: 20px; text-align: center; color: var(--text-muted);"></h2>
        <div id="matchesList"></div>
    </div>

    <script>
        function toggleMode() {
            const mode = document.getElementById('tournamentMode').value;
            if (mode === '1v1') {
                document.getElementById('inputs1v1').classList.remove('hidden');
                document.getElementById('inputs2v2').classList.add('hidden');
            } else {
                document.getElementById('inputs1v1').classList.add('hidden');
                document.getElementById('inputs2v2').classList.remove('hidden');
            }
        }

        function genererTournoi() {
            const mode = document.getElementById('tournamentMode').value;
            const matchesList = document.getElementById('matchesList');
            document.getElementById('roundTitle').innerText = `Planning des Matchs (${mode})`;
            matchesList.innerHTML = '';

            let participants = [];

            if (mode === '1v1') {
                const inputs = document.querySelectorAll('.player-in');
                inputs.forEach(input => participants.push(input.value.trim()));
                
                // Algorithme de Berger / Round Robin pour 6 joueurs
                let rencontres = [];
                for (let i = 0; i < participants.length; i++) {
                    for (let j = i + 1; j < participants.length; j++) {
                        rencontres.push([participants[i], participants[j]]);
                    }
                }
                
                // Mélanger un peu les matchs pour le rythme
                rencontres.sort(() => Math.random() - 0.5);
                
                afficherMatchs(rencontres);
            } else {
                const inputs = document.querySelectorAll('.team-in');
                inputs.forEach(input => participants.push(input.value.trim()));

                // Championnat à 3 équipes avec Matchs Aller/Retour pour plus de fun
                let rencontres = [
                    [participants[0], participants[1]], // A vs B
                    [participants[1], participants[2]], // B vs C
                    [participants[2], participants[0]], // C vs A
                    [participants[1], participants[0]], // B vs A (Retour)
                    [participants[2], participants[1]], // C vs B (Retour)
                    [participants[0], participants[2]]  // A vs C (Retour)
                ];

                afficherMatchs(rencontres);
            }
        }

        function afficherMatchs(matchs) {
            const matchesList = document.getElementById('matchesList');
            matchs.forEach((match, index) => {
                const card = document.createElement('div');
                card.className = 'match-card';
                card.innerHTML = `
                    <div class="team home">${match[0]}</div>
                    <input type="number" class="score-input" placeholder="0" min="0">
                    <div class="vs">VS</div>
                    <input type="number" class="score-input" placeholder="0" min="0">
                    <div class="team away">${match[1]}</div>
                `;
                matchesList.appendChild(card);
            });
        }
    </script>
</body>
</html>
