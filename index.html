<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIXEL ARENA - TOURNOI FC26</title>
    <style>
        :root {
            --bg-color: #0f0c1b;
            --card-bg: #1d1836;
            --accent-color: #00ff87;
            --token-color: #ffd700;
            --danger-color: #ff4a4a;
            --text-color: #ffffff;
            --text-muted: #a3a0b8;
            --border-color: #2f2954;
            --input-bg: #2a244d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: var(--accent-color);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .setup-section {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto 30px auto;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-weight: bold;
        }

        select, input, button {
            width: 100%;
            padding: 12px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-color);
            font-size: 16px;
            outline: none;
        }

        select:focus, input:focus {
            border-color: var(--accent-color);
        }

        button {
            background-color: var(--accent-color);
            color: var(--bg-color);
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: background 0.2s;
            margin-top: 10px;
        }

        button:hover {
            background-color: #00cc6a;
        }

        .main-layout {
            display: flex;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
            flex-wrap: wrap;
        }

        .tournament-container {
            flex: 1;
            min-width: 350px;
        }

        .ranking-container {
            flex: 1;
            min-width: 350px;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            height: fit-content;
        }

        .match-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .team {
            flex: 1;
            font-size: 16px;
            font-weight: 500;
        }

        .team.home { text-align: right; }
        .team.away { text-align: left; }

        .vs {
            padding: 0 10px;
            color: var(--accent-color);
            font-weight: bold;
            font-style: italic;
        }

        .score-input {
            width: 55px;
            text-align: center;
            padding: 8px;
            margin: 0 10px;
            border-radius: 4px;
            background-color: var(--input-bg);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            color: var(--text-muted);
            font-weight: bold;
        }

        td.player-name {
            text-align: left;
            font-weight: bold;
        }

        tr:first-child td.player-name {
            color: var(--token-color);
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <header>
        <h1>Pixel Arena — Tournoi FC 26</h1>
        <p>Gestionnaire de match & Classement en direct (7 Joueurs)</p>
    </header>

    <div class="setup-section">
        <div class="form-group">
            <label for="tournamentMode">Format du tournoi :</label>
            <select id="tournamentMode" onchange="toggleMode()">
                <option value="1v1">1 vs 1 (7 Joueurs)</option>
                <option value="2v2">2 vs 2 (3 Équipes + 1 Remplaçant/Trio)</option>
            </select>
        </div>

        <div id="inputs1v1">
            <label>Noms des 7 joueurs :</label>
            <div class="form-group"><input type="text" class="player-in" value="Joueur 1"></div>
            <div class="form-group"><input type="text" class="player-in" value="Joueur 2"></div>
            <div class="form-group"><input type="text" class="player-in" value="Joueur 3"></div>
            <div class="form-group"><input type="text" class="player-in" value="Joueur 4"></div>
            <div class="form-group"><input type="text" class="player-in" value="Joueur 5"></div>
            <div class="form-group"><input type="text" class="player-in" value="Joueur 6"></div>
            <div class="form-group"><input type="text" class="player-in" value="Joueur 7"></div>
        </div>

        <div id="inputs2v2" class="hidden">
            <label>Noms des équipes (2v2) :</label>
            <div class="form-group"><input type="text" class="team-in" value="Équipe A (2 joueurs)"></div>
            <div class="form-group"><input type="text" class="team-in" value="Équipe B (2 joueurs)"></div>
            <div class="form-group"><input type="text" class="team-in" value="Équipe C (3 joueurs) "></div>
        </div>

        <button onclick="genererTournoi()">Lancer le Tournoi</button>
    </div>

    <div class="main-layout hidden" id="tournamentLayout">
        <div class="tournament-container">
            <h2 style="margin-bottom: 20px; color: var(--accent-color);">Planning des Matchs</h2>
            <div id="matchesList"></div>
        </div>

        <div class="ranking-container">
            <h2 style="margin-bottom: 20px; color: var(--token-color); text-align: center;">Classement Général</h2>
            <table>
                <thead>
                    <tr>
                        <th style="width: 10%">Pos</th>
                        <th style="text-align: left;">Nom</th>
                        <th style="width: 15%">Pts</th>
                        <th style="width: 15%">J</th>
                        <th style="width: 15%">GA.</th>
                    </tr>
                </thead>
                <tbody id="rankingTableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        let listeParticipants = [];
        let listeMatchs = [];

        function toggleMode() {
            const mode = document.getElementById('tournamentMode').value;
            if (mode === '1v1') {
                document.getElementById('inputs1v1').classList.remove('hidden');
                document.getElementById('inputs2v2').classList.add('hidden');
            } else {
                document.getElementById('inputs1v1').classList.add('hidden');
                document.getElementById('inputs2v2').classList.remove('hidden');
            }
        }

        function genererTournoi() {
            const mode = document.getElementById('tournamentMode').value;
            document.getElementById('tournamentLayout').classList.remove('hidden');
            
            listeParticipants = [];
            listeMatchs = [];

            if (mode === '1v1') {
                const inputs = document.querySelectorAll('.player-in');
                inputs.forEach(input => {
                    if(input.value.trim() !== "") listeParticipants.push(input.value.trim());
                });
                
                // Tout le monde rencontre tout le monde (21 matchs pour 7 joueurs)
                for (let i = 0; i < listeParticipants.length; i++) {
                    for (let j = i + 1; j < listeParticipants.length; j++) {
                        listeMatchs.push({ home: listeParticipants[i], away: listeParticipants[j], scoreHome: null, scoreAway: null });
                    }
                }
                // Mélange aléatoire des matchs
                listeMatchs.sort(() => Math.random() - 0.5);
            } else {
                const inputs = document.querySelectorAll('.team-in');
                inputs.forEach(input => {
                    if(input.value.trim() !== "") listeParticipants.push(input.value.trim());
                });

                let rencontres = [
                    [listeParticipants[0], listeParticipants[1]],
                    [listeParticipants[1], listeParticipants[2]],
                    [listeParticipants[2], listeParticipants[0]],
                    [listeParticipants[1], listeParticipants[0]],
                    [listeParticipants[2], listeParticipants[1]],
                    [listeParticipants[0], listeParticipants[2]]
                ];
                rencontres.forEach(r => listeMatchs.push({ home: r[0], away: r[1], scoreHome: null, scoreAway: null }));
            }

            afficherMatchs();
            calculerClassement();
        }

        function afficherMatchs() {
            const matchesList = document.getElementById('matchesList');
            matchesList.innerHTML = '';

            listeMatchs.forEach((match, index) => {
                const card = document.createElement('div');
                card.className = 'match-card';
                card.innerHTML = `
                    <div class="team home">${match.home}</div>
                    <input type="number" class="score-input" id="scoreH-${index}" min="0" oninput="mettreAJourScore(${index}, 'home', this.value)">
                    <div class="vs">VS</div>
                    <input type="number" class="score-input" id="scoreA-${index}" min="0" oninput="mettreAJourScore(${index}, 'away', this.value)">
                    <div class="team away">${match.away}</div>
                `;
                matchesList.appendChild(card);
            });
        }

        function mettreAJourScore(index, side, value) {
            const scoreVal = value === "" ? null : parseInt(value, 10);
            if (side === 'home') {
                listeMatchs[index].scoreHome = scoreVal;
            } else {
                listeMatchs[index].scoreAway = scoreVal;
            }
            calculerClassement();
        }

        function calculerClassement() {
            let stats = {};
            
            listeParticipants.forEach(p => {
                stats[p] = { nom: p, points: 0, joues: 0, butsMarques: 0, butsEncaissees: 0, ga: 0 };
            });

            listeMatchs.forEach(match => {
                if (match.scoreHome !== null && match.scoreAway !== null) {
                    stats[match.home].joues++;
                    stats[match.away].joues++;
                    stats[match.home].butsMarques += match.scoreHome;
                    stats[match.home].butsEncaissees += match.scoreAway;
                    stats[match.away].butsMarques += match.scoreAway;
                    stats[match.away].butsEncaissees += match.scoreHome;

                    if (match.scoreHome > match.scoreAway) {
                        stats[match.home].points += 3;
                    } else if (match.scoreHome < match.scoreAway) {
                        stats[match.away].points += 3;
                    } else {
                        stats[match.home].points += 1;
                        stats[match.away].points += 1;
                    }
                }
            });

            Object.keys(stats).forEach(p => {
                stats[p].ga = stats[p].butsMarques - stats[p].butsEncaissees;
            });

            let classement = Object.values(stats).sort((a, b) => {
                if (b.points !== a.points) return b.points - a.points;
                return b.ga - a.ga;
            });

            const tbody = document.getElementById('rankingTableBody');
            tbody.innerHTML = '';
            
            classement.forEach((p, idx) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><strong>${idx + 1}</strong></td>
                    <td class="player-name">${p.nom}</td>
                    <td><strong>${p.points}</strong></td>
                    <td>${p.joues}</td>
                    <td>${p.ga > 0 ? '+' + p.ga : p.ga}</td>
                `;
                tbody.appendChild(row);
            });
        }
    </script>
</body>
</html>
